services:
  divinemesh-node:
    build:
      context: .
      dockerfile: Dockerfile
    image: divinemesh/node:latest
    container_name: divinemesh-node
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
    volumes:
      - divinemesh-data:/app/data
      - divinemesh-logs:/app/logs
    environment:
      - DIVINEMESH_NETWORK=polygon
      - DIVINEMESH_COORDINATOR=http://divinemesh-coordinator:8888
      - DIVINEMESH_PORT=7474
    networks:
      - divinemesh-net

  divinemesh-dashboard:
    image: nginx:1.25-alpine
    container_name: divinemesh-dashboard
    restart: unless-stopped
    volumes:
      - /root/divinemesh:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - divinemesh-net

  divinemesh-coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: divinemesh-coordinator
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8888"
    environment:
      - PORT=8888
    networks:
      - divinemesh-net

volumes:
  divinemesh-data:
  divinemesh-logs:

networks:
  divinemesh-net:
    driver: bridge
