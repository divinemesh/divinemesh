version: "3.9"

# 'A prudent person foresees danger and takes precautions.' - Proverbs 22:3
# DivineMesh Docker Compose — maximum isolation, minimum footprint

services:
  divinemesh-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: divinemesh/node:latest
    container_name: divinemesh-node
    restart: unless-stopped

    # ── Resource Limits ───────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"      # Configurable — user sets their own limit
          memory: "2G"
        reservations:
          cpus: "0.25"
          memory: "256M"

    # ── Security ──────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
      - seccomp:./security/seccomp.json
      - apparmor:unconfined    # Override with divinemesh profile in production

    cap_drop:
      - ALL                    # Drop ALL Linux capabilities
    cap_add:
      - NET_BIND_SERVICE       # Only what is required

    read_only: true            # Root filesystem is read-only

    # Writable tmpfs volumes — ephemeral, never touch host disk
    tmpfs:
      - /tmp:size=256m,mode=1777,noexec
      - /run:size=64m

    volumes:
      - divinemesh-data:/app/data   # Encrypted identity store (user's keys only)
      - divinemesh-logs:/app/logs

    ports:
      - "127.0.0.1:7474:7474"  # Local API — loopback ONLY, never public

    environment:
      - DIVINEMESH_NETWORK=${DIVINEMESH_NETWORK:-polygon}
      - DIVINEMESH_COORDINATOR=${DIVINEMESH_COORDINATOR:-https://coordinator.divinemesh.com}
      - DIVINEMESH_PORT=7474

    # ── GPU Support (optional) ────────────────────────────────────────────
    # Uncomment to enable GPU passthrough:
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    networks:
      - divinemesh-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dashboard (local web UI) ───────────────────────────────────────────────
  divinemesh-dashboard:
    image: nginx:1.25-alpine
    container_name: divinemesh-dashboard
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m
      - /var/cache/nginx:size=32m
      - /var/run:size=8m
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8080:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - divinemesh-net

volumes:
  divinemesh-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${HOME}/.divinemesh/data"
  divinemesh-logs:
    driver: local

networks:
  divinemesh-net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.28.0.0/24
